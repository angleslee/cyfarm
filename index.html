<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B2A20">
<title>Farm Ledger — Sg Bidut &amp; 25 Mile</title>
<style>
:root{
  --bg:#F2F5EE; --card:#FFFFFF; --ink:#1B2A20; --muted:#66755F; --line:#DFE6D8;
  --sale:#2E7D4F; --sale-soft:#E5F1E8;
  --exp:#BC4B28; --exp-soft:#F8E9E2;
  --adv:#C98A08; --adv-soft:#F9F0DC;
  --settle:#48688F; --settle-soft:#E8EEF6;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--ink); font-size:16px;
  padding-bottom:84px;
}
header{
  padding:16px 18px 10px; display:flex; align-items:baseline; justify-content:space-between;
}
header h1{font-size:20px; margin:0; letter-spacing:-.3px; font-weight:800}
header .today{font-size:12.5px; color:var(--muted); font-weight:600}
main{padding:0 14px}
h2.sec{font-size:13px; text-transform:uppercase; letter-spacing:.8px; color:var(--muted); margin:22px 4px 8px}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:14px; margin-bottom:12px}
.num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"}
button{font:inherit; border:none; cursor:pointer; color:inherit; background:none}
input,select,textarea{
  font:inherit; width:100%; padding:12px; border:1.5px solid var(--line); border-radius:10px;
  background:#fff; color:var(--ink); min-height:48px;
}
input:focus,select:focus,textarea:focus{outline:2px solid var(--sale); outline-offset:1px; border-color:var(--sale)}
button:focus-visible, .entry:focus-visible, a:focus-visible{outline:2px solid var(--sale); outline-offset:2px; border-radius:4px}
.chip:focus-visible, .slab:focus-visible, .wbtn:focus-visible{outline:2px solid var(--ink); outline-offset:2px}
nav button:focus-visible{outline:2px solid var(--sale); outline-offset:-3px}
label.f{display:block; font-size:12.5px; font-weight:700; color:var(--muted); margin:14px 2px 5px; text-transform:uppercase; letter-spacing:.5px}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px}

/* type slabs — the signature */
.slabs{display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:8px}
.slab{
  border-radius:var(--radius); padding:16px 6px 13px; text-align:center; font-weight:800; font-size:14.5px;
  border:1.5px solid var(--line); background:#fff; color:var(--muted); transition:transform .06s;
}
.slab .ic{display:block; font-size:22px; margin-bottom:4px}
.slab:active{transform:scale(.97)}
.slab.on-Sale{background:var(--sale); border-color:var(--sale); color:#fff}
.slab.on-Expense{background:var(--exp); border-color:var(--exp); color:#fff}
.slab.on-Advance{background:var(--adv); border-color:var(--adv); color:#fff}

/* chips */
.chips{display:flex; flex-wrap:wrap; gap:8px}
.chip{
  padding:11px 15px; border-radius:999px; border:1.5px solid var(--line); background:#fff;
  font-weight:700; font-size:14.5px; color:var(--ink); min-height:44px;
}
.chip.on{background:var(--ink); border-color:var(--ink); color:#fff}
.chip.add{color:var(--muted); border-style:dashed}

.bigamt{
  text-align:center; margin:16px 0 4px; font-size:34px; font-weight:800; letter-spacing:-.5px;
}
.bigamt small{font-size:15px; color:var(--muted); font-weight:700; margin-right:6px}
.autohint{text-align:center; font-size:12px; color:var(--muted); margin-bottom:4px}

.savebtn{
  width:100%; padding:16px; border-radius:var(--radius); font-weight:800; font-size:17px; color:#fff;
  background:var(--ink); margin-top:18px;
}
.savebtn.t-Sale{background:var(--sale)} .savebtn.t-Expense{background:var(--exp)} .savebtn.t-Advance{background:var(--adv)}
.cancelbtn{width:100%; padding:12px; font-weight:700; color:var(--muted); margin-top:6px}

.editbanner{background:var(--settle-soft); border:1.5px solid var(--settle); color:var(--settle);
  border-radius:10px; padding:10px 12px; font-weight:700; font-size:14px; margin-top:10px}

/* entries list */
.filters{display:flex; gap:8px; margin:10px 0 12px}
.filters select{min-height:42px; padding:8px 10px; font-size:14px; font-weight:600; border-radius:10px}
.dayhead{font-size:12.5px; font-weight:800; color:var(--muted); margin:16px 4px 6px; letter-spacing:.3px}
.entry{
  display:flex; align-items:center; gap:12px; background:#fff; border:1px solid var(--line);
  border-radius:12px; padding:11px 13px; margin-bottom:7px; width:100%; text-align:left;
}
.entry .dot{width:10px; height:10px; border-radius:50%; flex:none}
.dot.Sale{background:var(--sale)} .dot.Expense{background:var(--exp)} .dot.Advance{background:var(--adv)} .dot.Settlement{background:var(--settle)} .dot.Payout{background:#4E9A6B}
.entry .mid{flex:1; min-width:0}
.entry .t1{font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.entry .t2{font-size:12.5px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.entry .amt{font-weight:800; font-size:15.5px; flex:none}
.amt.Sale{color:var(--sale)} .amt.Expense{color:var(--exp)} .amt.Advance{color:var(--adv)} .amt.Settlement{color:var(--settle)} .amt.Payout{color:#4E9A6B}
.empty{color:var(--muted); text-align:center; padding:30px 10px; font-size:14.5px}

/* workers */
.wname{font-size:18px; font-weight:800}
.wfarm{font-size:12.5px; color:var(--muted); font-weight:700}
.balrow{display:flex; justify-content:space-between; align-items:center; margin-top:10px}
.bal{font-size:24px; font-weight:800}
.bal.pos{color:var(--adv)} .bal.zero{color:var(--sale)}
.wbtns{display:flex; gap:8px; margin-top:12px}
.wbtn{flex:1; padding:12px; border-radius:10px; font-weight:800; font-size:14.5px; border:1.5px solid var(--line)}
.wbtn.adv{background:var(--adv-soft); border-color:var(--adv); color:var(--adv)}
.wbtn.settle{background:var(--settle-soft); border-color:var(--settle); color:var(--settle)}
table.mini{width:100%; border-collapse:collapse; margin-top:12px; font-size:13.5px}
table.mini th{color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.4px; text-align:right; padding:5px 4px; border-bottom:1px solid var(--line)}
table.mini th:first-child, table.mini td:first-child{text-align:left}
table.mini td{padding:6px 4px; text-align:right; border-bottom:1px solid var(--line)}
table.mini tr:last-child td{border-bottom:none}
table.mini tr.tot td{font-weight:800; border-top:2px solid var(--ink)}
.hist{margin-top:10px}
.histrow{display:flex; justify-content:space-between; font-size:13.5px; padding:6px 2px; border-bottom:1px solid var(--line)}
.histrow:last-child{border-bottom:none}
.histrow .d{color:var(--muted)}
details summary{font-weight:700; font-size:14px; color:var(--settle); cursor:pointer; margin-top:10px}

/* summary */
.kpis{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.kpi{background:#fff; border:1px solid var(--line); border-radius:var(--radius); padding:13px}
.kpi .k{font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:800}
.kpi .v{font-size:21px; font-weight:800; margin-top:4px}
.kpi.profit{grid-column:1/-1; text-align:center; padding:16px}
.kpi.profit .v{font-size:30px}
.v.good{color:var(--sale)} .v.bad{color:var(--exp)}
.monthsel{display:flex; gap:8px; margin:10px 0 14px}
.monthsel select{flex:1}

/* settings */
.setrow{display:flex; align-items:center; justify-content:space-between; padding:9px 2px; border-bottom:1px solid var(--line); gap:8px}
.setrow:last-child{border-bottom:none}
.del{color:var(--exp); font-weight:800; font-size:18px; padding:4px 10px}
.smallbtn{padding:10px 14px; border-radius:10px; border:1.5px solid var(--ink); font-weight:700; font-size:14px}
.smallbtn.danger{border-color:var(--exp); color:var(--exp)}
.exportbtn{width:100%; padding:15px; border-radius:var(--radius); background:var(--ink); color:#fff; font-weight:800; font-size:16px}
.ratesgrid input{min-height:40px; padding:8px; text-align:right}
.note{font-size:12.5px; color:var(--muted); line-height:1.45; margin-top:8px}

/* nav */
nav{
  position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
  display:flex; padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  z-index:50;
}
nav button{flex:1; text-align:center; font-size:10.5px; font-weight:700; color:var(--muted); padding:5px 0; border-radius:10px}
nav button .ic{display:block; font-size:20px; margin-bottom:2px}
nav button.on{color:var(--ink); background:var(--bg)}

/* toast + modal */
#toast{
  position:fixed; bottom:96px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; padding:11px 20px; border-radius:999px; font-weight:700; font-size:14.5px;
  opacity:0; pointer-events:none; transition:all .25s; z-index:99; white-space:nowrap;
}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.modalbg{position:fixed; inset:0; background:rgba(20,30,22,.45); z-index:60; display:flex; align-items:flex-end; justify-content:center}
.modal{background:#fff; border-radius:18px 18px 0 0; padding:18px 16px calc(20px + env(safe-area-inset-bottom)); width:100%; max-width:520px}
.modal h3{margin:0 0 4px; font-size:17px}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
@media(min-width:640px){ main,header{max-width:560px; margin:0 auto} nav{max-width:560px; left:50%; transform:translateX(-50%); border:1px solid var(--line); border-radius:16px 16px 0 0} }
</style>
</head>

</nav>

const KEY='farm-ledger-v1';
const store={
  async load(){
    if(typeof window.storage!=='undefined' && window.storage && window.storage.get){
      try{ const r=await window.storage.get(KEY); if(r && r.value) return JSON.parse(r.value); }catch(e){}
      return null;
    }
    try{ const v=localStorage.getItem(KEY); return v?JSON.parse(v):null; }catch(e){ return null; }
  },
  async save(data){
    const s=JSON.stringify(data);
    if(typeof window.storage!=='undefined' && window.storage && window.storage.set){
      try{ await window.storage.set(KEY,s); return true; }catch(e){}
    }
    try{ localStorage.setItem(KEY,s); return true; }catch(e){ return false; }
  }
};

async function save(){ await store.save(S); }
function uid(){ return 'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(n){ const v=Number(n)||0; return 'RM '+v.toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmt0(n){ const v=Number(n)||0; return 'RM '+v.toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2}); }
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function monthLabel(ym){ const [y,m]=ym.split('-'); return MN[+m-1]+' '+y; }
function dateLabel(ds){ const [y,m,d]=ds.split('-'); return +d+' '+MN[+m-1]+' '+y; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1900); }

/* ============ BUSINESS LOGIC ============ */
/* ===== Data migration: upgrades any older saved state in place (runs on load & restore) ===== */
function migrate(d){
  const set=d.settings;
  if(!Array.isArray(set.workers)){
    set.workers=set.farms.filter(f=>f.worker).map(f=>({id:uid(), name:f.worker, farm:f.name, earnsCommission:true, active:true}));
    for(const f of set.farms) delete f.worker;
  }
  if(!Array.isArray(set.customers)){
    const seen={};
    for(const e of d.entries){
      if(e.type!=='Sale'||!e.customer) continue;
      const n=e.customer.trim(); if(!n) continue;
      const k=n.toLowerCase();
      if(!seen[k]) seen[k]={id:uid(), name:n, active:true};
    }
    set.customers=Object.values(seen);
  }
  for(const w of set.workers){ if(!w.id) w.id=uid(); if(w.active===undefined) w.active=true; if(w.earnsCommission===undefined) w.earnsCommission=true; }
  for(const c of set.customers){ if(!c.id) c.id=uid(); if(c.active===undefined) c.active=true; }
  set.dataVersion=4;
  return d;
}
function workersList(){ return S.settings.workers.filter(w=>w.active).map(w=>({id:w.id, name:w.name, farm:w.farm})); }
function allWorkers(){ return S.settings.workers; }
function activeWorkersOfFarm(farm){ return S.settings.workers.filter(w=>w.active && w.farm===farm); }
function farmOfWorker(name){ const w=S.settings.workers.find(w=>w.name===name); return w?w.farm:''; }
function activeCustomers(){ return S.settings.customers.filter(c=>c.active); }
function customerFrequency(){
  const f={};
  for(const e of S.entries){ if(e.type==='Sale'&&e.customer) f[e.customer]=(f[e.customer]||0)+1; }
  return f;
}
function lastPriceFor(category, grade){
  let best=null;
  for(const e of S.entries){
    if(e.type==='Sale' && e.category===category && (e.grade||'')===(grade||'') && e.price!=null){
      if(!best || e.date>best.date) best=e;
    }
  }
  return best?best.price:null;
}

function rateFor(produce, grade){
  const r=S.settings.rates[produce];
  if(!r) return 0;
  return Number(r[grade]||0);
}

/* Sales attributed to a farm; 'Both' split 50/50 */
function farmShare(entry, farmName){
  if(entry.farm===farmName) return 1;
  if(entry.farm==='Both') return 0.5;
  return 0;
}

function commissionFor(worker, ym){
  const w=S.settings.workers.find(x=>x.name===worker);
  if(!w || !w.active || !w.earnsCommission) return 0;
  const peers=activeWorkersOfFarm(w.farm).filter(x=>x.earnsCommission).length || 1;
  let c=0;
  for(const e of S.entries){
    if(e.type!=='Sale' || !e.date.startsWith(ym) || !e.qty) continue;
    const share=farmShare(e, w.farm); if(!share) continue;
    c += e.qty * rateFor(e.category, e.grade||'') * share;
  }
  return c/peers;
}
function salaryFor(worker, ym){
  let s=0;
  for(const p of S.settings.salaryPeriods){
    if(p.worker!==worker) continue;
    if(ym>=p.start && (!p.end || ym<=p.end)) s+=Number(p.salary)||0;
  }
  return s;
}
function sumEntries(fn){ let t=0; for(const e of S.entries){ t+=fn(e)||0; } return t; }
function advancesFor(worker, ym){ return sumEntries(e=> e.type==='Advance'&&e.worker===worker&&(!ym||e.date.startsWith(ym)) ? e.amount:0); }
function settlementsFor(worker, ym){ return sumEntries(e=> e.type==='Settlement'&&e.worker===worker&&(!ym||e.date.startsWith(ym)) ? e.amount:0); }
function outstanding(worker){ return advancesFor(worker,null)-settlementsFor(worker,null); }

function monthsWithData(){
  const set=new Set(S.entries.map(e=>e.date.slice(0,7)));
  set.add(todayStr().slice(0,7));
  return [...set].sort().reverse();
}
function inPeriod(e, sel){
  if(sel.startsWith('YEAR-')) return e.date.startsWith(sel.slice(5));
  return e.date.startsWith(sel);
}
function monthsInPeriod(sel){
  if(!sel.startsWith('YEAR-')) return [sel];
  const y=sel.slice(5);
  return monthsWithData().filter(m=>m.startsWith(y));
}
function periodStats(sel){
  const farms=S.settings.farms.map(f=>f.name);
  const st={ sales:0, expenses:0, salary:0, commission:0, byFarm:{}, byProduce:{} };
  for(const fn of farms) st.byFarm[fn]={sales:0, expenses:0, salary:0, commission:0};
  for(const e of S.entries){
    if(!inPeriod(e,sel)) continue;
    if(e.type==='Sale'){
      st.sales+=e.amount;
      for(const fn of farms){ const sh=farmShare(e,fn); if(sh){ st.byFarm[fn].sales+=e.amount*sh; } }
      const key=e.category+(e.grade?' ('+e.grade+')':'');
      if(!st.byProduce[key]) st.byProduce[key]={kg:0, rm:0};
      st.byProduce[key].kg+=e.qty||0; st.byProduce[key].rm+=e.amount;
    } else if(e.type==='Expense'){
      st.expenses+=e.amount;
      if(st.byFarm[e.farm]) st.byFarm[e.farm].expenses+=e.amount;
    }
  }
  /* Salary follows salary periods (history stays true even if a worker is deactivated);
     commission goes to active commission earners only. */
  const salWorkers=[...new Set(S.settings.salaryPeriods.map(p=>p.worker))];
  for(const ym of monthsInPeriod(sel)){
    for(const name of salWorkers){
      const sal=salaryFor(name,ym);
      if(!sal) continue;
      st.salary+=sal;
      const farm=farmOfWorker(name);
      if(st.byFarm[farm]) st.byFarm[farm].salary+=sal;
    }
    for(const w of S.settings.workers){
      if(!w.active) continue;
      const com=commissionFor(w.name,ym);
      if(!com) continue;
      st.commission+=com;
      if(st.byFarm[w.farm]) st.byFarm[w.farm].commission+=com;
    }
  }
  st.costs=st.expenses+st.salary+st.commission;
  st.profit=st.sales-st.costs;
  return st;
}

/* ============ ADD FORM ============ */
let F=null;
function blankForm(type){
  const set=S.settings;
  const t=type||'Sale';
  const farm=(set.lastFarm && set.farms.some(f=>f.name===set.lastFarm)) ? set.lastFarm : set.farms[0].name;
  const F={
    type:t, farm,
    category: t==='Expense' ? set.expenseCats[0] : set.produce[0],
    grade:'A', qty:'', price:'', pAuto:false, amount:'', customer:'', notes:'',
    worker: t==='Advance' ? (activeWorkersOfFarm(farm)[0]||{}).name||'' : '',
    date:todayStr()
  };
  if(t==='Sale'){
    const lp=lastPriceFor(F.category, F.grade);
    if(lp!=null){ F.price=String(lp); F.pAuto=true; }
  }
  return F;
}
function customerChoices(){
  const freq=customerFrequency();
  return activeCustomers().slice().sort((a,b)=>(freq[b.name]||0)-(freq[a.name]||0));
}

      (ws.length?ws.map(x=>`<button class="chip ${F.worker===x.name?'on':''}" aria-pressed="${F.worker===x.name}" onclick="setF('worker',${JSON.stringify(x.name).replace(/"/g,'&quot;')})">👷 ${esc(x.name)}</button>`).join(''):

    html+=`<label class="f" id="catLbl">${t==='Sale'?'Produce':'Category'}</label><div class="chips" role="group" aria-labelledby="catLbl">`+

    `</div>`;
  }

  if(t==='Sale'){
    html+=`<label class="f" id="gradeLbl">Grade</label><div class="chips" role="group" aria-labelledby="gradeLbl">`+
      ['A','B',''].map(g=>`<button class="chip ${F.grade===g?'on':''}" aria-pressed="${F.grade===g}" onclick="setF('grade','${g}')">${g||'N/A'}</button>`).join('')+
    `</div>
    <div class="row2">
      <div><label class="f" for="qtyInput">Quantity (kg)</label><input id="qtyInput" type="number" inputmode="decimal" step="any" value="${esc(F.qty)}" oninput="numF('qty',this.value)" placeholder="0"></div>

    <div><label class="f" for="notesInput">Notes</label><input id="notesInput" value="${esc(F.notes)}" oninput="setF('notes',this.value)" placeholder="optional"></div>
  </div>`;

  if(editingId) html+=`<button class="cancelbtn" onclick="cancelEdit()">Cancel editing</button><button class="cancelbtn" style="color:var(--exp)" onclick="deleteEntry('${editingId}')">🗑 Delete this entry</button>`;
  document.getElementById('view').innerHTML=html;
}
function round2(n){ return Math.round((Number(n)||0)*100)/100; }
function setType(t){ const keep={farm:F.farm, date:F.date}; F=blankForm(t); F.farm=(t!=='Sale'&&keep.farm==='Both')?S.settings.farms[0].name:keep.farm; F.date=keep.date; renderAdd(); }
function setF(k,v){
  F[k]=v;
  if(k==='farm'){
    S.settings.lastFarm = (v==='Both')?S.settings.lastFarm:v; save();
    if(F.type==='Advance') F.worker=(activeWorkersOfFarm(v)[0]||{}).name||'';
  }
  /* Price memory: picking produce or grade prefills your last price for that combo (typing always wins) */
  if(F.type==='Sale' && (k==='category'||k==='grade') && (F.pAuto || F.price==='')){
    const lp=lastPriceFor(F.category, F.grade);
    F.price = lp!=null ? String(lp) : '';
    F.pAuto = lp!=null;
    F.amount='';
  }
  if(k==='farm'||k==='category'||k==='grade'||k==='worker') renderAdd();   /* chip taps only — never re-render while typing */
  else if(k==='amount') updateAmountDisplay();
}
function pickCustomer(name){ F.customer = (F.customer===name)?'':name; renderAdd(); }
function newCustomerFromForm(){
  const v=prompt('New customer name'); if(!v||!v.trim()) return;
  const name=v.trim();
  const ex=S.settings.customers.find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(ex){ ex.active=true; F.customer=ex.name; }
  else { S.settings.customers.push({id:uid(), name, active:true}); F.customer=name; }
  save(); renderAdd();
}
/* Called on every keystroke in qty/price — must NOT re-render the form,
   or the input is destroyed and the phone keyboard closes. Update displays only. */
function numF(k,v){ F[k]=v; if(k==='price') F.pAuto=false; F.amount=''; updateAmountDisplay(); }
function updateAmountDisplay(){
  const autoAmt=(F.type==='Sale' && F.qty!=='' && F.price!=='' && !isNaN(F.qty) && !isNaN(F.price)) ? Number(F.qty)*Number(F.price) : null;
  const shown = F.amount!=='' ? F.amount : (autoAmt!=null?autoAmt:'');
  const amtIn=document.getElementById('amountInput');
  if(amtIn && document.activeElement!==amtIn) amtIn.value = shown===''?'':round2(shown);
  const big=document.getElementById('bigAmt');
  if(big) big.innerHTML='<small>RM</small>'+(Number(shown)||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});
  const hint=document.getElementById('autoHint');
  if(hint) hint.textContent=(F.type==='Sale' && autoAmt!=null && F.amount==='') ? 'auto: '+F.qty+' kg × RM '+F.price+'/kg' : '';
}

function saveEntry(){
  const t=F.type;
  const autoAmt=(t==='Sale'&&F.qty&&F.price)?Number(F.qty)*Number(F.price):null;
  const amount=round2(F.amount!==''?F.amount:(autoAmt!=null?autoAmt:0));
  if(!amount || amount<=0){ toast('Enter an amount first'); return; }
  if(!F.date){ toast('Pick a date'); return; }
  const rec={
    id: editingId||uid(),
    date:F.date, farm:F.farm, type:t,
    category: t==='Advance' ? (F.category||'Advance') : F.category,
    customer:(F.customer||'').trim(),
    grade: t==='Sale'?F.grade:'',
    qty: t==='Sale'&&F.qty!==''?Number(F.qty):null,
    price: t==='Sale'&&F.price!==''?Number(F.price):null,
    amount,
    worker: t==='Advance'?(F.worker||''):'',
    notes:(F.notes||'').trim()
  };
  if(t==='Advance' && !rec.worker){ toast('Pick a worker for this advance'); return; }
  if(editingId){
    const i=S.entries.findIndex(e=>e.id===editingId);
    if(i>=0){ const orig=S.entries[i]; if(orig.type==='Settlement'||orig.type==='Payout'){rec.type=orig.type; rec.worker=orig.worker; if(orig.payMonth)rec.payMonth=orig.payMonth;} S.entries[i]=rec; }
    editingId=null;
    toast('Entry updated');
    F=blankForm(t);
    save(); switchTab('entries'); return;
  }
  S.entries.push(rec);
  save();
  toast((t==='Sale'?'🟢 Sale':t==='Expense'?'🔴 Expense':'🟠 Advance')+' saved — '+fmt(amount));
  const keepFarm=F.farm, keepDate=F.date, keepCat=F.category, keepGrade=F.grade;
  F=blankForm(t); F.farm=keepFarm; F.date=keepDate; F.category=keepCat; F.grade=keepGrade;
  renderAdd();
}
function cancelEdit(){ editingId=null; F=null; switchTab('entries'); }
function deleteEntry(id){
  if(!confirm('Delete this entry? This cannot be undone.')) return;
  S.entries=S.entries.filter(e=>e.id!==id);
  editingId=null; F=null; save(); toast('Entry deleted'); switchTab('entries');
}
function editEntry(id){
  const e=S.entries.find(x=>x.id===id); if(!e) return;
  editingId=id;
  F={ type: (e.type==='Settlement'||e.type==='Payout')?'Advance':e.type, farm:e.farm, category:e.category,
      grade:e.grade||'A', qty:e.qty!=null?String(e.qty):'', price:e.price!=null?String(e.price):'', pAuto:false,
      amount:String(e.amount), customer:e.customer||'', notes:e.notes||'', worker:e.worker||'', date:e.date };
  if(e.type==='Settlement') F.type='Advance'; /* edited as advance-like; type preserved on save */
  switchTab('add');
}

/* ============ ENTRIES TAB ============ */
function renderEntries(){
  const months=monthsWithData();
  const farms=S.settings.farms.map(f=>f.name);
  let list=S.entries.slice().sort((a,b)=> b.date.localeCompare(a.date));
  const f=entryFilters;
  if(f.farm!=='All') list=list.filter(e=>e.farm===f.farm||(f.farm!=='Both'&&e.farm==='Both'&&e.type==='Sale'));
  if(f.type!=='All') list=list.filter(e=>e.type===f.type);
  if(f.month!=='All') list=list.filter(e=>e.date.startsWith(f.month));

  let html=`<div class="filters">
    <select aria-label="Filter by farm" onchange="entryFilters.farm=this.value;renderEntries()">
      <option value="All">All farms</option>${farms.map(x=>`<option ${f.farm===x?'selected':''}>${esc(x)}</option>`).join('')}<option ${f.farm==='Both'?'selected':''}>Both</option>
    </select>
    <select aria-label="Filter by type" onchange="entryFilters.type=this.value;renderEntries()">
      <option value="All">All types</option>${['Sale','Expense','Advance','Settlement','Payout'].map(x=>`<option ${f.type===x?'selected':''}>${x}</option>`).join('')}
    </select>
    <select aria-label="Filter by month" onchange="entryFilters.month=this.value;renderEntries()">
      <option value="All">All months</option>${months.map(m=>`<option value="${m}" ${f.month===m?'selected':''}>${monthLabel(m)}</option>`).join('')}
    </select>
  </div>`;

  if(!list.length){ html+=`<div class="empty">No entries match these filters.<br>Tap ➕ Add to record one.</div>`; }
  let curDay='';
  let dayTotal=0;
  for(const e of list){
    if(e.date!==curDay){
      curDay=e.date;
      html+=`<div class="dayhead">${dateLabel(e.date)}</div>`;
    }
    const sign = e.type==='Sale'?'+':(e.type==='Settlement'?'−':'−');
    const sub=[];
    if(e.type==='Sale'){ if(e.qty) sub.push(e.qty+' kg'+(e.price?' @ RM'+e.price+'/kg':'')); if(e.customer) sub.push(e.customer); }
    else { if(e.customer) sub.push(e.customer); if(e.worker) sub.push('👷 '+e.worker); }
    if(e.notes) sub.push(e.notes);
    html+=`<button class="entry" onclick="editEntry('${e.id}')">
      <span class="dot ${e.type}"></span>
      <span class="mid"><span class="t1">${esc(e.category)}${e.grade?' · Grade '+esc(e.grade):''} <span style="color:var(--muted);font-weight:600">· ${esc(e.farm)}</span></span>

}

          <span><span class="d">${dateLabel(e.date)}</span> &nbsp;<b class="num">${e.type==='Advance'?'+':'−'}${fmt(e.amount)}</b></span></div>`).join(''):'<div class="note">No advances or payouts yet.</div>'}

          <span class="num" style="font-weight:700;color:${bal>0?'var(--adv)':'var(--muted)'}">${bal>0?'owes '+fmt(bal):'no balance'}</span></div>`;
      }).join('')+

  }

function quickAdvance(farm, worker){ F=blankForm('Advance'); F.farm=farm; if(worker) F.worker=worker; switchTab('add'); }
let modalReturnFocus=null;
function openSettle(worker){
  const bal=round2(outstanding(worker));
  modalReturnFocus=document.activeElement;
  const host=document.getElementById('modalHost');
  host.innerHTML=`<div class="modalbg" onclick="if(event.target===this)closeModal()">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="settleTitle">
      <h3 id="settleTitle">Settle advances — ${esc(worker)}</h3>
      <div class="note">Records a settlement (e.g. deducted from salary). Outstanding: <b>${fmt(bal)}</b></div>
      <label class="f" for="settleAmt">Amount to settle (RM)</label>
      <input id="settleAmt" type="number" inputmode="decimal" step="any" value="${bal}">
      <label class="f" for="settleDate">Date</label>
      <input id="settleDate" type="date" value="${todayStr()}">
      <label class="f" for="settleNote">Note</label>
      <input id="settleNote" placeholder="e.g. deducted from July salary">
      <button class="savebtn" style="background:var(--settle)" onclick="doSettle('${esc(worker)}')">✓ Record settlement</button>
      <button class="cancelbtn" onclick="closeModal()">Cancel</button>
    </div></div>`;
  const modalEl=host.querySelector('.modal');
  modalEl.addEventListener('keydown', trapModalKey);
  document.getElementById('settleAmt').focus();
}
function trapModalKey(e){
  if(e.key==='Escape'){ closeModal(); return; }
  if(e.key!=='Tab') return;
  const focusables=e.currentTarget.querySelectorAll('input,button,select,textarea,[tabindex]:not([tabindex="-1"])');
  if(!focusables.length) return;
  const first=focusables[0], last=focusables[focusables.length-1];
  if(e.shiftKey && document.activeElement===first){ e.preventDefault(); last.focus(); }
  else if(!e.shiftKey && document.activeElement===last){ e.preventDefault(); first.focus(); }
}
function closeModal(){
  document.getElementById('modalHost').innerHTML='';
  if(modalReturnFocus && modalReturnFocus.focus) modalReturnFocus.focus();
  modalReturnFocus=null;
}

/* ===== Salary payout ===== */
function openPayout(worker){
  modalReturnFocus=document.activeElement;
  const ym=todayStr().slice(0,7);
  const months=monthsWithData();
  const host=document.getElementById('modalHost');
  host.innerHTML=`<div class="modalbg" onclick="if(event.target===this)closeModal()">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="payTitle">
      <h3 id="payTitle">💰 Pay salary — ${esc(worker)}</h3>
      <label class="f" for="payMonth">Paying for month</label>
      <select id="payMonth" onchange="updatePayoutCalc('${esc(worker)}')">${months.map(m=>`<option value="${m}" ${m===ym?'selected':''}>${monthLabel(m)}</option>`).join('')}</select>
      <table class="mini num" id="payTable"></table>
      <label class="f" for="payDeduct">Deduct advances (RM)</label>
      <input id="payDeduct" type="number" inputmode="decimal" step="any" oninput="updatePayoutCalc('${esc(worker)}',true)">
      <div class="note" id="payNote"></div>
      <label class="f" for="payDate">Payment date</label>
      <input id="payDate" type="date" value="${todayStr()}">
      <button class="savebtn" style="background:var(--sale)" onclick="doPayout('${esc(worker)}')" id="payBtn">✓ Record payment</button>
      <button class="cancelbtn" onclick="closeModal()">Cancel</button>
    </div></div>`;
  const modalEl=host.querySelector('.modal');
  modalEl.addEventListener('keydown', trapModalKey);
  updatePayoutCalc(worker);
}
function payoutCalc(worker, ym, deductOverride){
  const sal=round2(salaryFor(worker,ym)), com=round2(commissionFor(worker,ym));
  const bal=round2(outstanding(worker));
  const maxDeduct=round2(Math.min(bal, Math.max(sal+com,0)));
  let deduct = deductOverride==null ? maxDeduct : round2(Math.min(Math.max(Number(deductOverride)||0,0), bal));
  const net=round2(sal+com-deduct);
  return {sal, com, bal, deduct, net, maxDeduct};
}
function updatePayoutCalc(worker, keepTyped){
  const ym=document.getElementById('payMonth').value;
  const typed=keepTyped ? document.getElementById('payDeduct').value : null;
  const c=payoutCalc(worker, ym, keepTyped?typed:null);
  const dIn=document.getElementById('payDeduct');
  if(!keepTyped) dIn.value=c.deduct;
  document.getElementById('payTable').innerHTML=`
    <tr><td>Salary (${monthLabel(ym)})</td><td>${fmt(c.sal)}</td></tr>
    <tr><td>Commission (${monthLabel(ym)})</td><td>${fmt(c.com)}</td></tr>
    <tr><td>Advances deducted</td><td>−${fmt(c.deduct)}</td></tr>
    <tr class="tot"><td>Net cash to pay</td><td style="color:${c.net>=0?'var(--sale)':'var(--exp)'}">${fmt(c.net)}</td></tr>`;
  const remain=round2(c.bal-c.deduct);
  let note='';
  if(c.sal===0 && c.com===0) note='⚠️ No salary or commission for this month. Check Settings → Salary periods (blank end month = ongoing).';
  else if(remain>0) note='After this payment, '+esc(worker)+' still owes '+fmt(remain)+' in advances (carried over).';
  else note='This clears all outstanding advances for '+esc(worker)+'.';
  if(c.net<0) note+=' ⚠️ Net is negative — deduction is more than earnings. Lower the deduction; the rest carries over.';
  document.getElementById('payNote').innerHTML=note;
  document.getElementById('payBtn').disabled = c.net<0;
  document.getElementById('payBtn').style.opacity = c.net<0?'.45':'1';
}
function doPayout(worker){
  const ym=document.getElementById('payMonth').value;
  const c=payoutCalc(worker, ym, document.getElementById('payDeduct').value);
  if(c.net<0){ toast('Deduction is more than earnings — lower it'); return; }
  if(c.sal===0 && c.com===0 && c.deduct===0){ toast('Nothing to pay for '+monthLabel(ym)); return; }
  const date=document.getElementById('payDate').value||todayStr();
  const farm=farmOfWorker(worker);
  if(c.deduct>0){
    S.entries.push({ id:uid(), date, farm, type:'Settlement', category:'Settlement',
      customer:'Deducted from '+monthLabel(ym)+' salary', grade:'', qty:null, price:null,
      amount:c.deduct, worker, notes:'' });
  }
  S.entries.push({ id:uid(), date, farm, type:'Payout', category:'Salary Payout', payMonth:ym,
    customer:monthLabel(ym)+': salary '+c.sal+' + comm '+c.com+' − adv '+c.deduct, grade:'',
    qty:null, price:null, amount:c.net, worker, notes:'' });
  save(); closeModal();
  toast('Paid '+fmt(c.net)+' to '+worker+' ✓');
  renderWorkers();
}
function doSettle(worker){
  const amt=round2(document.getElementById('settleAmt').value);
  const date=document.getElementById('settleDate').value||todayStr();
  const note=document.getElementById('settleNote').value.trim();
  if(!amt||amt<=0){ toast('Enter a settlement amount'); return; }
  S.entries.push({ id:uid(), date, farm:farmOfWorker(worker), type:'Settlement', category:'Settlement',
    customer:note||'Salary deduction', grade:'', qty:null, price:null, amount:amt, worker, notes:'' });
  save(); closeModal(); toast('Settled '+fmt(amt)+' for '+worker); renderWorkers();
}

function renderSummary(){

  const st=periodStats(summarySel);

  const label=isYear?('Year '+summarySel.slice(5)):monthLabel(summarySel);

  let html=`<div class="monthsel"><select aria-label="Select period" onchange="summarySel=this.value;renderSummary()">`+
    months.map(m=>`<option value="${m}" ${summarySel===m?'selected':''}>${monthLabel(m)}</option>`).join('')+
    years.map(y=>`<option value="YEAR-${y}" ${summarySel==='YEAR-'+y?'selected':''}>Full year ${y}</option>`).join('')+
  `</select></div>`;

  html+=`<div class="kpis">
    <div class="kpi profit"><div class="k">${esc(label)} — Profit</div>
      <div class="v num ${st.profit>=0?'good':'bad'}">${fmt(round2(st.profit))}</div></div>

  </table>
  <div class="note">Advances and salary payouts are excluded here to avoid double counting: labor cost is already counted as full salary + commission in the month it is earned. Payout entries are your cash records of payday.</div></div>`;

  html+=`<h2 class="sec">By farm</h2>`;
  for(const fn of Object.keys(st.byFarm)){
    const f=st.byFarm[fn]; const p=f.sales-(f.expenses+f.salary+f.commission);
    html+=`<div class="card"><b>${esc(fn)}</b><table class="mini num">
      <tr><td>Sales</td><td>${fmt(round2(f.sales))}</td></tr>
      <tr><td>Expenses</td><td>−${fmt(round2(f.expenses))}</td></tr>
      <tr><td>Salary + commission</td><td>−${fmt(round2(f.salary+f.commission))}</td></tr>
      <tr class="tot"><td>Profit</td><td style="color:${p>=0?'var(--sale)':'var(--exp)'}">${fmt(round2(p))}</td></tr>
    </table></div>`;
  }

  /* ===== Detailed report ===== */
  html+=`<h2 class="sec">Detailed report — ${esc(label)}</h2>`;

  // Trading stats
  const salesInP=S.entries.filter(e=>e.type==='Sale'&&inPeriod(e,summarySel));
  const sellDays=new Set(salesInP.map(e=>e.date));
  if(salesInP.length){
    const kgTotal=salesInP.reduce((a,e)=>a+(e.qty||0),0);
    const avgDay=sellDays.size?st.sales/sellDays.size:0;
    const dayTotals={};
    for(const e of salesInP) dayTotals[e.date]=(dayTotals[e.date]||0)+e.amount;
    const best=Object.entries(dayTotals).sort((a,b)=>b[1]-a[1])[0];
    html+=`<div class="kpis" style="grid-template-columns:1fr 1fr">
      <div class="kpi"><div class="k">Selling days</div><div class="v num">${sellDays.size}</div></div>
      <div class="kpi"><div class="k">Avg sales / day</div><div class="v num">${fmt(round2(avgDay))}</div></div>
      <div class="kpi"><div class="k">Total kg sold</div><div class="v num">${round2(kgTotal).toLocaleString()} kg</div></div>
      <div class="kpi"><div class="k">Best day</div><div class="v num" style="font-size:15px">${best?dateLabel(best[0])+'<br>'+fmt(round2(best[1])):'—'}</div></div>
    </div>`;
  }

  // Produce performance with avg price
  const prod=Object.entries(st.byProduce).sort((a,b)=>b[1].rm-a[1].rm);
  if(prod.length){
    html+=`<details class="card" open><summary style="margin-top:0">🥬 Produce performance</summary><table class="mini num">
      <tr><th>Produce</th><th>kg</th><th>Avg RM/kg</th><th>RM</th></tr>`+
      prod.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${round2(v.kg).toLocaleString()}</td><td>${v.kg>0?round2(v.rm/v.kg).toFixed(2):'—'}</td><td>${fmt(round2(v.rm))}</td></tr>`).join('')+
      `<tr class="tot"><td>Total</td><td>${round2(prod.reduce((a,[,v])=>a+v.kg,0)).toLocaleString()}</td><td></td><td>${fmt(round2(st.sales))}</td></tr>
    </table><div class="note">Avg RM/kg tells you which produce and grade earns the most per kilo — useful for deciding what to plant more of.</div></details>`;
  }

  // Expense breakdown by category
  const expCat={};
  for(const e of S.entries){ if(e.type==='Expense'&&inPeriod(e,summarySel)) expCat[e.category]=(expCat[e.category]||0)+e.amount; }
  const expRows=Object.entries(expCat).sort((a,b)=>b[1]-a[1]);
  if(expRows.length){
    html+=`<details class="card" open><summary style="margin-top:0">🧾 Expenses by category</summary><table class="mini num">
      <tr><th>Category</th><th>% of exp.</th><th>RM</th></tr>`+
      expRows.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${st.expenses>0?Math.round(v/st.expenses*100)+'%':'—'}</td><td>${fmt(round2(v))}</td></tr>`).join('')+
      `<tr class="tot"><td>Total</td><td></td><td>${fmt(round2(st.expenses))}</td></tr>
    </table></details>`;
  }

  // Customers
  const cust={};
  for(const e of salesInP){ const c=e.customer||'(no name)'; if(!cust[c]) cust[c]={rm:0,kg:0,n:0}; cust[c].rm+=e.amount; cust[c].kg+=e.qty||0; cust[c].n++; }
  const custRows=Object.entries(cust).sort((a,b)=>b[1].rm-a[1].rm);
  if(custRows.length){
    html+=`<details class="card"><summary style="margin-top:0">🤝 Customers</summary><table class="mini num">
      <tr><th>Customer</th><th>Sales</th><th>kg</th><th>RM</th></tr>`+
      custRows.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${v.n}</td><td>${round2(v.kg).toLocaleString()}</td><td>${fmt(round2(v.rm))}</td></tr>`).join('')+
    `</table><div class="note">If one customer is most of your revenue, that's a risk worth knowing about.</div></details>`;
  }

  // Monthly trend (always across all recorded months)
  const trendMonths=monthsWithData().slice().sort();
  if(trendMonths.length>1){
    html+=`<details class="card" open><summary style="margin-top:0">📈 Monthly trend (all months)</summary><table class="mini num">
      <tr><th>Month</th><th>Sales</th><th>Costs</th><th>Profit</th></tr>`+
      trendMonths.map(m=>{
        const ms=periodStats(m);
        return `<tr ${m===summarySel?'style="font-weight:800"':''}><td>${monthLabel(m)}</td><td>${fmt(round2(ms.sales))}</td><td>${fmt(round2(ms.costs))}</td><td style="color:${ms.profit>=0?'var(--sale)':'var(--exp)'}">${fmt(round2(ms.profit))}</td></tr>`;
      }).join('')+
    `</table><div class="note">Costs include expenses + salary + commission. The bold row is the period selected above.</div></details>`;
  }
  document.getElementById('view').innerHTML=html;
}

  <div class="note">💰 = earns commission (a farm's commission splits equally among its active 💰 workers). Deactivate instead of deleting to keep history — delete only works when a worker has no records.</div></div>`;

  /* ===== Customers management ===== */
  html+=`<h2 class="sec">Customers</h2><div class="card">`;
  const cq=(uiSearch.customers||'').toLowerCase();
  const cfreq=customerFrequency();
  const clist=set.customers.slice().sort((a,b)=>(cfreq[b.name]||0)-(cfreq[a.name]||0)).filter(c=>!cq || c.name.toLowerCase().includes(cq));
  if(set.customers.length>10) html+=`<input type="search" placeholder="Search customers…" value="${esc(uiSearch.customers||'')}" oninput="uiSearch.customers=this.value;renderSettings();document.querySelectorAll('#view input[type=search]').forEach(x=>{if(x.placeholder.includes('customer'))x.focus()})" style="margin-bottom:10px">`;
  html+=clist.map(c=>{
    const i=set.customers.indexOf(c);
    const stats=customerStats(c.name);
    return `<div class="setrow" style="flex-wrap:wrap;opacity:${c.active?1:.55}">
      <input style="min-height:42px;flex:2;min-width:110px" aria-label="Customer name" value="${esc(c.name)}" onchange="renameCustomer(${i},this.value)">
      <span class="note num" style="flex:1;min-width:110px;margin:0">${stats.n?stats.n+' sales · '+fmt(round2(stats.rm)):'no sales yet'}</span>
      <button class="chip ${c.active?'on':''}" style="min-height:42px" onclick="toggleCustomerActive(${i})">${c.active?'Active':'Inactive'}</button>
      <button class="del" aria-label="Delete ${esc(c.name)}" onclick="deleteCustomer(${i})">×</button>
    </div>`;
  }).join('') || '<div class="note">No customers match.</div>';
  html+=`<button class="smallbtn" style="margin-top:10px" onclick="addCustomer()">+ Add customer</button>
  <div class="note">Inactive customers stay in your reports but disappear from the Add screen. Renaming updates all past sales.</div></div>`;

  html+=`<h2 class="sec">Produce (sales categories)</h2><div class="card"><div class="chips" role="group" aria-label="Produce categories">`+
    set.produce.map((p,i)=>`<span class="chip">${esc(p)} <button class="del" style="padding:0 2px 0 8px" aria-label="Remove ${esc(p)}" onclick="rmList('produce',${i})">×</button></span>`).join('')+
    `<button class="chip add" onclick="addList('produce','New produce name')">+ add</button></div></div>`;

  html+=`<h2 class="sec">Expense categories</h2><div class="card"><div class="chips" role="group" aria-label="Expense categories">`+
    set.expenseCats.map((p,i)=>`<span class="chip">${esc(p)} <button class="del" style="padding:0 2px 0 8px" aria-label="Remove ${esc(p)}" onclick="rmList('expenseCats',${i})">×</button></span>`).join('')+
    `<button class="chip add" onclick="addList('expenseCats','New category name')">+ add</button></div></div>`;

  html+=`<h2 class="sec">Commission rates (RM per kg)</h2><div class="card ratesgrid"><table class="mini num">
    <tr><th>Produce</th><th>Grade A</th><th>Grade B</th></tr>`+
    set.produce.map(p=>{
      const r=set.rates[p]||{A:0,B:0};
      return `<tr><td>${esc(p)}</td>
        <td><input type="number" inputmode="decimal" step="any" aria-label="${esc(p)} grade A rate, RM per kg" value="${r.A||0}" onchange="setRate(${JSON.stringify(p).replace(/"/g,'&quot;')},'A',this.value)"></td>
        <td><input type="number" inputmode="decimal" step="any" aria-label="${esc(p)} grade B rate, RM per kg" value="${r.B||0}" onchange="setRate(${JSON.stringify(p).replace(/"/g,'&quot;')},'B',this.value)"></td></tr>`;
    }).join('')+
  `</table><div class="note">Changing a rate recalculates all commission, past and future.</div></div>`;

  html+=`<h2 class="sec">Salary periods</h2><div class="card">`+
    set.salaryPeriods.map((p,i)=>`<div class="setrow" style="flex-wrap:wrap">
      <select aria-label="Worker" style="min-height:42px;flex:1;min-width:90px" onchange="updateSalary(${i},'worker',this.value)">${allWorkers().map(w=>`<option ${p.worker===w.name?'selected':''}>${esc(w.name)}${w.active?'':' (inactive)'}</option>`).join('')}</select>
      <input type="month" aria-label="Start month" style="min-height:42px;flex:1;min-width:120px" value="${esc(p.start)}" onchange="updateSalary(${i},'start',this.value)">
      <input type="month" aria-label="End month, leave blank for ongoing" style="min-height:42px;flex:1;min-width:120px" value="${esc(p.end||'')}" onchange="updateSalary(${i},'end',this.value)" placeholder="ongoing">
      <input type="number" inputmode="decimal" aria-label="Monthly salary in RM" style="min-height:42px;width:92px;text-align:right" value="${p.salary}" onchange="updateSalary(${i},'salary',this.value)">
      <button class="del" aria-label="Remove salary period${p.worker?' for '+esc(p.worker):''}" onclick="rmSalary(${i})">×</button>
    </div>`).join('')+
    `<button class="smallbtn" style="margin-top:10px" onclick="addSalary()">+ Add salary period</button>
    <div class="note">Worker · start month · end month (leave blank = ongoing) · RM/month. When a salary changes, close the old period and add a new one.</div></div>`;

  html+=`<h2 class="sec">Danger zone</h2><div class="card">
    <button class="smallbtn danger" onclick="eraseAll()">Erase ALL entries</button>
    <div class="note">Deletes every entry (settings kept). Export a backup first!</div></div>
  <div class="note" style="text-align:center;margin:16px 0">Farm Ledger v4 · ${S.entries.length} entries · data imported from your v12 template</div>`;
  document.getElementById('view').innerHTML=html;

}
function renameFarm(i,name){
  name=name.trim(); if(!name) { renderSettings(); return; }
  const old=S.settings.farms[i].name;
  if(old===name) return;
  for(const e of S.entries){ if(e.farm===old) e.farm=name; }
  for(const w of S.settings.workers){ if(w.farm===old) w.farm=name; }
  S.settings.farms[i].name=name;
  if(S.settings.lastFarm===old) S.settings.lastFarm=name;
  save(); toast('Farm renamed — entries updated'); renderSettings();
}
const uiSearch={workers:'', customers:''};
function customerStats(name){
  let n=0, rm=0;
  for(const e of S.entries){ if(e.type==='Sale'&&e.customer===name){ n++; rm+=e.amount; } }
  return {n, rm};
}
function addWorker(){
  const v=prompt('Worker name'); if(!v||!v.trim()) return;
  const name=v.trim();
  if(S.settings.workers.some(w=>w.name.toLowerCase()===name.toLowerCase())){ toast('A worker with that name already exists'); return; }
  S.settings.workers.push({id:uid(), name, farm:S.settings.farms[0].name, earnsCommission:true, active:true});
  save(); toast('Worker added — set their farm and salary period'); renderSettings();
}
function renameWorker(i,name){
  name=(name||'').trim();
  const w=S.settings.workers[i];
  if(!name || name===w.name){ renderSettings(); return; }
  if(S.settings.workers.some((x,xi)=>xi!==i && x.name.toLowerCase()===name.toLowerCase())){ toast('That name is already used'); renderSettings(); return; }
  const old=w.name;
  for(const e of S.entries){ if(e.worker===old) e.worker=name; }
  for(const pp of S.settings.salaryPeriods){ if(pp.worker===old) pp.worker=name; }
  w.name=name; save(); toast('Renamed — all records updated'); renderSettings();
}
function assignWorkerFarm(i,farm){ S.settings.workers[i].farm=farm; save(); toast('Farm assigned'); renderSettings(); }
function toggleCustomerActive(i){ S.settings.customers[i].active=!S.settings.customers[i].active; save(); renderSettings(); }
function toggleWorkerFlag(i,flag){
  S.settings.workers[i][flag]=!S.settings.workers[i][flag];
  save(); renderSettings();
}
function toggleWorkerActive(i){
  const w=S.settings.workers[i];
  if(w.active){
    const bal=round2(outstanding(w.name));
    let msg='Deactivate '+w.name+'? They keep their history but leave daily workflows.';
    if(bal>0) msg+='\n\nNote: they still owe '+fmt(bal)+' in advances.';
    if(!confirm(msg)) return;
    const ym=todayStr().slice(0,7);
    const open=S.settings.salaryPeriods.filter(pp=>pp.worker===w.name && !pp.end);
    if(open.length && confirm('Also end '+w.name+"'s ongoing salary period at "+monthLabel(ym)+'?')){
      for(const pp of open) pp.end=ym;
    }
    w.active=false;
  } else { w.active=true; }
  save(); renderSettings();
}
function deleteWorker(i){
  const w=S.settings.workers[i];
  const used=S.entries.some(e=>e.worker===w.name) || S.settings.salaryPeriods.some(pp=>pp.worker===w.name);
  if(used){ toast(w.name+' has records — deactivate instead of deleting'); return; }
  if(!confirm('Delete '+w.name+'? They have no records.')) return;
  S.settings.workers.splice(i,1); save(); renderSettings();
}
function addCustomer(){
  const v=prompt('Customer name'); if(!v||!v.trim()) return;
  const name=v.trim();
  const ex=S.settings.customers.find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(ex){ ex.active=true; toast('Customer already existed — set to active'); }
  else S.settings.customers.push({id:uid(), name, active:true});
  save(); renderSettings();
}
function renameCustomer(i,name){
  name=(name||'').trim();
  const c=S.settings.customers[i];
  if(!name || name===c.name){ renderSettings(); return; }
  if(S.settings.customers.some((x,xi)=>xi!==i && x.name.toLowerCase()===name.toLowerCase())){ toast('That name is already used'); renderSettings(); return; }
  const old=c.name;
  let updated=0;
  for(const e of S.entries){ if(e.type==='Sale' && e.customer===old){ e.customer=name; updated++; } }
  c.name=name; save(); toast('Renamed — '+updated+' sales updated'); renderSettings();
}
function deleteCustomer(i){
  const c=S.settings.customers[i];
  if(S.entries.some(e=>e.type==='Sale'&&e.customer===c.name)){ toast(c.name+' has sales — set Inactive instead'); return; }
  if(!confirm('Delete '+c.name+'?')) return;
  S.settings.customers.splice(i,1); save(); renderSettings();
}
function addList(key,promptMsg){
  const v=prompt(promptMsg); if(!v||!v.trim()) return;
  S.settings[key].push(v.trim());
  if(key==='produce' && !S.settings.rates[v.trim()]) S.settings.rates[v.trim()]={A:0,B:0};
  save(); renderSettings();
}
function rmList(key,i){
  const v=S.settings[key][i];
  const used=S.entries.some(e=>e.category===v);
  if(used){ if(!confirm('"'+v+'" is used by existing entries (they keep it). Remove from the quick-pick list?')) return; }
  S.settings[key].splice(i,1); save(); renderSettings();
}
function setRate(p,g,v){ if(!S.settings.rates[p]) S.settings.rates[p]={A:0,B:0}; S.settings.rates[p][g]=Number(v)||0; save(); toast('Rate saved'); }
function addSalary(){ const w=workersList()[0]; S.settings.salaryPeriods.push({worker:w?w.name:'', start:todayStr().slice(0,7), end:null, salary:0}); save(); renderSettings(); }
function rmSalary(i){ if(!confirm('Remove this salary period?')) return; S.settings.salaryPeriods.splice(i,1); save(); renderSettings(); }
function updateSalary(i,field,value){
  const p=S.settings.salaryPeriods[i]; if(!p) return;
  if(field==='salary') p.salary=Number(value)||0;
  else if(field==='end') p.end=value||null;
  else p[field]=value;
  save();
  if(field!=='salary') renderSettings();
}
function eraseAll(){
  if(!confirm('Delete ALL '+S.entries.length+' entries? Settings are kept.')) return;
  if(!confirm('Are you really sure? There is no undo. Export a CSV backup first if needed.')) return;
  S.entries=[]; save(); toast('All entries erased'); renderSettings();
}

/* ============ EXPORT ============ */
function downloadFile(name, content, type){
  const blob=new Blob([content],{type});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}
function markBackedUp(){ S.settings.lastBackup=todayStr(); save(); if(tab==='settings') renderSettings(); }
function exportBackup(){
  const payload={app:'farm-ledger', version:2, exported:new Date().toISOString(), data:S};
  downloadFile('farm-ledger-backup-'+todayStr()+'.json', JSON.stringify(payload), 'application/json');
  markBackedUp();
  toast('Backup file saved ✓');
}
function restoreBackup(input){
  const file=input.files && input.files[0];
  input.value='';
  if(!file) return;
  const reader=new FileReader();
  reader.onerror=()=>toast('Could not read that file');
  reader.onload=()=>{
    let payload;
    try{ payload=JSON.parse(reader.result); }
    catch(e){ toast('That file is not a valid backup'); return; }
    const d=payload && payload.app==='farm-ledger' ? payload.data : payload;
    if(!d || !Array.isArray(d.entries) || !d.settings || !Array.isArray(d.settings.farms)){
      toast('That file is not a Farm Ledger backup'); return;
    }
    if(!confirm('Restore backup from '+(payload.exported?payload.exported.slice(0,10):'unknown date')+' with '+d.entries.length+' entries?\n\nThis REPLACES all data currently on this phone.')) return;
    S=migrate(d); save(); toast('Backup restored — '+d.entries.length+' entries'); renderSettings();
  };
  reader.readAsText(file);
}
function exportCSV(){
  const head=['Date','Source','Type','Category','Customer / Description','Grade','Quantity (kg)','Amount (RM)','Worker','Notes'];
  const rows=S.entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
    const source = e.type==='Sale' ? 'Sales - '+e.farm : e.farm+' Expenses';
    const typ = e.type==='Advance'?'Worker Advance':(e.type==='Payout'?'Salary Payout':e.type);
    let notes=e.notes||'';
    if(e.type==='Sale' && e.price!=null && !/@/.test(notes)) notes=(notes?notes+' ':'')+'@'+e.price+'/kg';
    return [e.date, source, typ, e.category, e.customer, e.grade, e.qty!=null?e.qty:'', e.amount, e.worker, notes];
  });
  const csv=[head].concat(rows).map(r=>r.map(v=>{
    v=String(v==null?'':v);
    return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;
  }).join(',')).join('\r\n');
  downloadFile('farm-ledger-'+todayStr()+'.csv', '\ufeff'+csv, 'text/csv;charset=utf-8');
  markBackedUp();
  toast('CSV exported ✓');
}

/* ============ NAV / INIT ============ */
function switchTab(t){
  tab=t;
  document.querySelectorAll('nav button').forEach(b=>{
    const on=b.dataset.tab===t;
    b.classList.toggle('on', on);
    if(on) b.setAttribute('aria-current','page'); else b.removeAttribute('aria-current');
  });
  window.scrollTo(0,0);
  if(t==='add') renderAdd();
  else if(t==='entries') renderEntries();
  else if(t==='workers') renderWorkers();
  else if(t==='summary') renderSummary();
  else renderSettings();
}
document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{ if(b.dataset.tab!=='add'){editingId=null;} switchTab(b.dataset.tab); });

(async function init(){
  document.getElementById('hdrDate').textContent=dateLabel(todayStr());
  const saved=await store.load();
  if(saved && saved.entries && saved.settings){ S=migrate(saved); }
  else { S=migrate(defaultState()); }
  await save();
  switchTab('add');
})();
</script>
</body>
</html>
